name: Testing stuff

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  a_test_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: commits
        env:
          COMMITS: ${{ toJson(github.event.commits) }}
        run: echo "$COMMITS"
      - name: commit messages
        env:
          COMMIT_MESSAGES: ${{ toJson(github.event.commits.*.message) }}
        run: echo "$COMMIT_MESSAGES"
      - name: check contain
        env:
          TEST: ${{ !contains(join(github.event.commits.*.message), 'branch') }}
        run: 
          echo "$TEST"
      - name: run if true
        if: ${{ !contains(join(github.event.commits.*.message), 'branch') && github.event_name == 'push'}}
        run:
          echo "dont run this"
      - name: test github.workflow
        run: |
          echo ${{toJson(github.workflow)}}
          echo ${{ toJson(github.run_id) }}